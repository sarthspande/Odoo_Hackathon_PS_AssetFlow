<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="/static/css/styles.css">
    </head>
    <body>
        <h1>Login</h1>
        <form>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="employee_id">Employee ID:</label>
                <input type="text" id="employee_id" name="employee_id" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="dept">Department:</label>
                <input type="text" id="dept" name="dept" required>
            </div>
            <div class="form-group">
                <label for="role">Role:</label>
                <select id="role" name="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                    <option value="manager">Manager</option>
                </select>
            </div>
            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status" required>
                    <option value="">Select Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <button type="submit">Login</button>
        </form>
    </body>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" integrity="sha384-TMbGmdp4ZC0N6vGJ2k1+38qDpG0z+WhR+2jqBNu6Mu8nQR3mQ6pI1t4vzMN5Diu7" crossorigin="anonymous"></script>
    <script>
        function setCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/';
        }

        function getCookie(name) {
            return document.cookie.split('; ').reduce((r, c) => {
                const [key, v] = c.split('=');
                return key === name ? decodeURIComponent(v) : r;
            }, '');
        }

        function saveLoginCookie(data) {
            const cookieValue = JSON.stringify({
                username: data.username,
                employee_id: data.employee_id,
                email: data.email,
                password: data.password,
                dept: data.dept,
                role: data.role,
                status: data.status
            });
            setCookie('loginInfo', cookieValue, 30);
        }

        function populateFormFromCookie() {
            const cookieValue = getCookie('loginInfo');
            if (!cookieValue) return null;

            try {
                const loginInfo = JSON.parse(cookieValue);
                if (loginInfo.username) document.getElementById('username').value = loginInfo.username;
                if (loginInfo.employee_id) document.getElementById('employee_id').value = loginInfo.employee_id;
                if (loginInfo.email) document.getElementById('email').value = loginInfo.email;
                if (loginInfo.password) document.getElementById('password').value = loginInfo.password;
                if (loginInfo.dept) document.getElementById('dept').value = loginInfo.dept;
                if (loginInfo.role) document.getElementById('role').value = loginInfo.role;
                if (loginInfo.status) document.getElementById('status').value = loginInfo.status;
                return loginInfo;
            } catch (err) {
                console.warn('Failed to parse login cookie', err);
                return null;
            }
        }

        (function(){
            const socket = io({transports: ['websocket']});
            let autoLoginData = null;

            socket.on('connect', () => {
                console.log('Socket.IO connected');
                if (autoLoginData) {
                    sendLogin(autoLoginData);
                    autoLoginData = null;
                }
            });
            socket.on('disconnect', () => console.log('Socket.IO disconnected'));
            socket.on('login_ack', (message) => console.log('Login ack from server:', message));

            autoLoginData = populateFormFromCookie();

            function sendLogin(data) {
                data.timestamp = new Date().toISOString();
                saveLoginCookie(data);
                socket.emit('login', data);
                console.log('Sent login payload via Socket.IO', data);
            }

            const form = document.querySelector('form');
            form.addEventListener('submit', function(e){
                e.preventDefault();
                const data = {
                    username: document.getElementById('username').value,
                    employee_id: document.getElementById('employee_id').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    dept: document.getElementById('dept').value,
                    role: document.getElementById('role').value,
                    status: document.getElementById('status').value
                };
                sendLogin(data);
            });

            if (autoLoginData) {
                if (socket.connected) {
                    sendLogin(autoLoginData);
                    autoLoginData = null;
                }
            }
        })();
    </script>
</html>
