<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowCore — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body class="auth-page">
    <div class="container" x-data="loginPage()" x-init="init()">
        <div class="panel">
            <div class="panel-header" style="display:block;">
                <h1 class="header-title" style="margin-bottom:4px;">Welcome back</h1>
                <p class="header-subtitle">Login to your FlowCore account.</p>
            </div>

            <template x-if="errorMessage">
                <div class="toast show" style="position:static;transform:none;background:#fef2f2;color:#b91c1c;margin:0 0 16px;width:100%;box-sizing:border-box;" x-text="errorMessage"></div>
            </template>
            {% if error %}
                <div class="toast show" style="position:static;transform:none;background:#fef2f2;color:#b91c1c;margin:0 0 16px;width:100%;box-sizing:border-box;">{{ error }}</div>
            {% endif %}

            <form @submit.prevent="submitLogin" action="{{ url_for('login') }}" method="post" class="form-grid" style="grid-template-columns:1fr;">
                <div>
                    <label class="form-label" for="employee_id">Employee ID</label>
                    <input class="input" type="text" id="employee_id" name="employee_id" placeholder="Employee ID" x-model="form.employee_id">
                </div>
                <div>
                    <label class="form-label" for="email">Email</label>
                    <input class="input" type="email" id="email" name="email" placeholder="Email address" x-model="form.email">
                </div>
                <p style="text-align:center;color:#94a3b8;font-size:0.8rem;margin:-8px 0;">Enter your Employee ID or Email</p>
                <div>
                    <label class="form-label" for="password">Password</label>
                    <input class="input" type="password" id="password" name="password" placeholder="Password" x-model="form.password" required>
                </div>
                <button class="button" type="submit" style="width:100%;justify-content:center;">Login</button>
            </form>

            <p class="auth-links">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>

    <script>
        function loginPage() {
            return {
                errorMessage: '',
                socket: null,
                socketConnected: false,
                form: { employee_id: '', email: '', password: '' },
                init() {
                    if (typeof io === 'undefined') return;
                    this.socket = io();
                    this.socket.on('connect', () => this.socketConnected = true);
                    this.socket.on('disconnect', () => this.socketConnected = false);
                    this.socket.on('connect_error', () => this.socketConnected = false);
                    this.socket.on('login_response', (response) => {
                        if (!response.success) {
                            this.errorMessage = response.error || 'Login failed.';
                            return;
                        }
                        window.location.href = response.redirect;
                    });
                },
                submitLogin() {
                    this.errorMessage = '';
                    if (!this.socket || !this.socketConnected) {
                        return this.fallback();
                    }
                    const timeout = setTimeout(() => this.fallback(), 3000);
                    this.socket.emit('login', { ...this.form });
                    this.socket.once('login_response', () => clearTimeout(timeout));
                },
                fallback() {
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '{{ url_for("login") }}';
                    Object.entries(this.form).forEach(([name, value]) => {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = name;
                        input.value = value || '';
                        form.appendChild(input);
                    });
                    document.body.appendChild(form);
                    form.submit();
                }
            };
        }
    </script>
</body>
</html>
