<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowCore - Report Issue</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#eef3ff;
    font-family:'Segoe UI',sans-serif;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.page-title{
    color:#4f46e5;
    font-weight:700;
}

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
}

.form-control:focus,
.form-select:focus{
    border-color:#4f46e5;
    box-shadow:0 0 0 .15rem rgba(79,70,229,.25);
}

.btn-primary{
    background:linear-gradient(135deg,#4f46e5,#6366f1);
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:600;
    transition:.3s;
}

.btn-primary:hover{
    opacity:.9;
}

.badge-report{
    background:#eef2ff;
    color:#4f46e5;
    padding:8px 16px;
    border-radius:20px;
    font-weight:600;
}

textarea{
    resize:none;
}
</style>

</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card p-4">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <div>
                        <h2 class="page-title">Report Issue</h2>
                        <p class="text-muted mb-0">
                            Report an issue related to an asset.
                        </p>
                    </div>

                    <span class="badge-report">
                        Report
                    </span>

                </div>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Asset</label>
                        <select class="form-select">
                            <option selected>Select Asset</option>
                            <option>AF-0001 • Dell Latitude 5420</option>
                            <option>AF-0002 • HP Printer</option>
                            <option>AF-0003 • Projector</option>
                            <option>AF-0004 • Office Chair</option>
                        </select>
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Issue Category</label>
                            <select class="form-select">
                                <option selected>Select Category</option>
                                <option>Asset Damaged</option>
                                <option>Asset Missing</option>
                                <option>Malfunction</option>
                                <option>Wrong Allocation</option>
                                <option>Lost Asset</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Priority</label>
                            <select class="form-select">
                                <option>Low</option>
                                <option selected>Medium</option>
                                <option>High</option>
                                <option>Critical</option>
                            </select>
                        </div>

                    </div>

                    <div class="mb-3">
                        <label class="form-label">Issue Title</label>
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Enter a short title">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Issue Description</label>
                        <textarea
                            class="form-control"
                            rows="5"
                            placeholder="Describe the issue in detail..."></textarea>
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Reported By</label>
                            <input
                                type="text"
                                class="form-control"
                                value="John Doe"
                                readonly>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Report Date</label>
                            <input
                                type="date"
                                class="form-control">
                        </div>

                    </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-primary">
                            Submit Report
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
