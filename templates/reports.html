{% extends "base.html" %}
{% block content %}
<div x-data="reportPage()" x-init="init()" class="panel" style="max-width:640px;margin:0 auto;">
  <div class="panel-header">
    <h2>Report Issue</h2>
    <span class="badge badge-pending">Report</span>
  </div>

  <template x-if="submitted">
    <div class="empty-state" style="padding:40px 12px;">
      <p style="font-size:1rem;color:#111827;font-weight:700;margin-bottom:6px;">Report submitted</p>
      <p>Thanks — the asset team has been notified.</p>
      <button class="button" style="margin-top:16px;" @click="reset()">Report another issue</button>
    </div>
  </template>

  <form @submit.prevent="submit" class="form-grid" style="grid-template-columns:1fr;" x-show="!submitted">
    <div>
      <label class="form-label">Asset</label>
      <select class="select" x-model="form.asset_id" required>
        <option value="" disabled selected>Select Asset</option>
        <template x-for="asset in assets" :key="asset.asset_id">
          <option :value="asset.asset_id" x-text="asset.asset_tag + ' • ' + asset.name"></option>
        </template>
      </select>
    </div>

    <div class="form-grid" style="grid-template-columns:1fr 1fr;margin-bottom:0;">
      <div>
        <label class="form-label">Issue Category</label>
        <select class="select" x-model="form.category" required>
          <option value="" disabled selected>Select Category</option>
          <option>Asset Damaged</option>
          <option>Asset Missing</option>
          <option>Malfunction</option>
          <option>Wrong Allocation</option>
          <option>Lost Asset</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label class="form-label">Priority</label>
        <select class="select" x-model="form.priority">
          <option>Low</option>
          <option selected>Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>
      </div>
    </div>

    <div>
      <label class="form-label">Issue Title</label>
      <input class="input" type="text" x-model="form.title" placeholder="Enter a short title" required>
    </div>

    <div>
      <label class="form-label">Issue Description</label>
      <textarea class="textarea" x-model="form.description" placeholder="Describe the issue in detail..." required></textarea>
    </div>

    <div class="form-grid" style="grid-template-columns:1fr 1fr;margin-bottom:0;">
      <div>
        <label class="form-label">Reported By</label>
        <input class="input" type="text" value="{{ current_user.name }}" readonly>
      </div>
      <div>
        <label class="form-label">Report Date</label>
        <input class="input" type="date" x-model="form.report_date">
      </div>
    </div>

    <button type="submit" class="button" :disabled="submitting" style="justify-content:center;">
      <span x-text="submitting ? 'Submitting…' : 'Submit Report'"></span>
    </button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
function reportPage() {
  return {
    assets: [],
    submitting: false,
    submitted: false,
    form: { asset_id: '', category: '', priority: 'Medium', title: '', description: '', report_date: new Date().toISOString().slice(0, 10) },

    init() {
      fetch('/api/assets').then(res => res.json()).then(data => this.assets = data)
        .catch(() => shellNotify('Failed to load assets.'));
    },

    reset() {
      this.submitted = false;
      this.form = { asset_id: '', category: '', priority: 'Medium', title: '', description: '', report_date: new Date().toISOString().slice(0, 10) };
    },

    submit() {
      this.submitting = true;
      fetch('/api/maintenance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.form)
      })
        .then(res => res.ok ? res.json() : res.json().then(err => Promise.reject(err)))
        .then(() => { this.submitting = false; this.submitted = true; })
        .catch(err => { this.submitting = false; shellNotify(err.error || 'Failed to submit report.'); });
    }
  };
}
</script>
{% endblock %}
