{% extends "base.html" %}
{% block content %}
<div x-data="dashboardPage()" x-init="init()">

  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5">
    <div>
      <h2 class="text-lg font-semibold text-slate-900">Dashboard Overview</h2>
      <p class="text-sm text-slate-500 mt-0.5">{{ current_user.role_description }}</p>
    </div>
  </div>

  <template x-if="loading">
    <p class="empty-state">Loading dashboard…</p>
  </template>

  <template x-if="!loading">
    <div>
      <div class="kpi-grid">
        <template x-for="card in kpiCards" :key="card.label">
          <div class="kpi-card">
            <div class="kpi-icon" :class="card.bg">
              <span :class="card.fg" x-html="card.icon"></span>
            </div>
            <p class="kpi-value" x-text="card.value"></p>
            <p class="kpi-label" x-text="card.label"></p>
          </div>
        </template>
      </div>

      <div class="grid grid-cols-1 xl:grid-cols-2 gap-5">
        <div class="panel">
          <div class="panel-header">
            <h2>Overdue Returns</h2>
            <span class="badge badge-lost" x-text="overdueReturns.length + ' overdue'"></span>
          </div>
          <div class="table-wrapper">
            <table class="table">
              <thead>
                <tr><th>Asset</th><th>Holder</th><th>Due Date</th><th>Overdue</th></tr>
              </thead>
              <tbody>
                <template x-for="row in overdueReturns" :key="row.id">
                  <tr>
                    <td>
                      <p class="font-medium text-slate-800" x-text="row.asset"></p>
                      <p class="text-xs text-slate-400" x-text="row.tag"></p>
                    </td>
                    <td x-text="row.holder"></td>
                    <td x-text="row.due_date"></td>
                    <td><span class="badge badge-lost" x-text="row.days_overdue + 'd'"></span></td>
                  </tr>
                </template>
              </tbody>
            </table>
            <p class="empty-state" x-show="overdueReturns.length === 0">No overdue returns. Nice work 🎉</p>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h2>Upcoming Returns</h2>
            <span class="badge badge-pending" x-text="'Next ' + upcomingReturns.length"></span>
          </div>
          <div class="table-wrapper">
            <table class="table">
              <thead>
                <tr><th>Asset</th><th>Holder</th><th>Due Date</th><th>Left</th></tr>
              </thead>
              <tbody>
                <template x-for="row in upcomingReturns" :key="row.id">
                  <tr>
                    <td>
                      <p class="font-medium text-slate-800" x-text="row.asset"></p>
                      <p class="text-xs text-slate-400" x-text="row.tag"></p>
                    </td>
                    <td x-text="row.holder"></td>
                    <td x-text="row.due_date"></td>
                    <td><span class="badge badge-pending" x-text="row.days_left + 'd'"></span></td>
                  </tr>
                </template>
              </tbody>
            </table>
            <p class="empty-state" x-show="upcomingReturns.length === 0">Nothing due soon.</p>
          </div>
        </div>
      </div>
    </div>
  </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function dashboardPage() {
  return {
    loading: true,
    kpis: {},
    overdueReturns: [],
    upcomingReturns: [],

    init() {
      fetch('/api/dashboard')
        .then(res => res.json())
        .then(data => {
          this.kpis = data.kpis;
          this.overdueReturns = data.overdue_returns;
          this.upcomingReturns = data.upcoming_returns;
          this.loading = false;
        })
        .catch(() => { this.loading = false; shellNotify('Failed to load dashboard data.'); });
    },

    get kpiCards() {
      return [
        { label: 'Assets Available', value: this.kpis.available, bg: 'bg-emerald-50', fg: 'text-emerald-600',
          icon: '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m9 12 2 2 4-4m5 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>' },
        { label: 'Assets Allocated', value: this.kpis.allocated, bg: 'bg-brand-50', fg: 'text-brand-600',
          icon: '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 4h6m-3-3v6"/></svg>' },
        { label: 'Pending Maintenance', value: this.kpis.maintenance_pending, bg: 'bg-orange-50', fg: 'text-orange-600',
          icon: '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m14.7 6.3 3 3L7 20H4v-3L14.7 6.3Zm0 0 2-2a2.1 2.1 0 0 1 3 3l-2 2"/></svg>' },
        { label: 'Active Bookings', value: this.kpis.active_bookings, bg: 'bg-sky-50', fg: 'text-sky-600',
          icon: '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M16 2v4M8 2v4M3 10h18"/></svg>' },
        { label: 'Active Allocations', value: this.kpis.active_allocations, bg: 'bg-violet-50', fg: 'text-violet-600',
          icon: '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 3v6h-6M7 21v-6h6M3 9a9 9 0 0 1 15-6.7L21 5M21 15a9 9 0 0 1-15 6.7L3 19"/></svg>' },
        { label: 'Upcoming Returns', value: this.upcomingReturns.length, bg: 'bg-amber-50', fg: 'text-amber-600',
          icon: '<svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01"/></svg>' }
      ];
    }
  };
}
</script>
{% endblock %}
